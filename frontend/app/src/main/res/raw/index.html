<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Management App Preview</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #root {
      height: 100%;
      background: #f0f4ff;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext } = React;

    const ThemeContext = createContext(false);
    const useTheme = () => useContext(ThemeContext);

    // ─── DESIGN TOKENS ───────────────────────────────────────────────────────────
    const C = {
      primary: "hsl(221, 83%, 53%)",
      primaryHover: "hsl(221, 83%, 43%)",
      primaryLight: "hsl(221, 83%, 95%)",
      accent: "hsl(221, 83%, 53%)",
      success: "hsl(221, 83%, 53%)",
      warning: "hsl(221, 83%, 53%)",
      danger: "hsl(221, 83%, 53%)",
      bg: "hsl(210, 20%, 98%)",
      card: "hsl(0, 0%, 100%)",
      text: "hsl(220, 26%, 14%)",
      muted: "hsl(220, 10%, 50%)",
      border: "hsl(220, 20%, 90%)",
      dark: {
        bg: "hsl(222, 47%, 9%)",
        card: "hsl(220, 26%, 14%)",
        primary: "hsl(221, 83%, 53%)",
        primaryHover: "hsl(221, 83%, 63%)",
        text: "hsl(0, 0%, 100%)",
        muted: "hsl(220, 10%, 60%)",
        border: "hsl(220, 20%, 25%)",
      },
    };

    // ─── ICONS (inline SVG components) ───────────────────────────────────────────
    const Icon = ({ name, size = 20, color = "currentColor", style = {} }) => {
      const icons = {
        home: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />,
        dashboard: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />,
        star: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />,
        bell: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />,
        chat: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />,
        user: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />,
        settings: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />,
        book: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />,
        clipboard: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />,
        plus: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />,
        check: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />,
        x: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />,
        arrow_right: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />,
        arrow_left: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />,
        eye: <><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></>,
        eye_off: <><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></>,
        download: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />,
        send: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />,
        moon: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />,
        sun: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />,
        team: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />,
        chart: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />,
        folder: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 7a2 2 0 012-2h4l2 2h6a2 2 0 012 2v7a2 2 0 01-2 2H5a2 2 0 01-2-2V7z" />,
        logout: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />,
        menu: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />,
        search: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />,
        filter: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />,
        link: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />,
        file: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />,
        request: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />,
        section: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />,
        lock: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />,
        mail: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />,
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} style={style}>
          {icons[name]}
        </svg>
      );
    };

    // ─── AVATAR ──────────────────────────────────────────────────────────────────
    const Avatar = ({ name = "U", size = 36, color }) => {
      const dark = useTheme();
      const actualColor = color || (dark ? C.dark.primary : C.primary);
      return (
        <div style={{
          width: size, height: size, borderRadius: "50%",
          background: `linear-gradient(135deg, ${actualColor}, ${actualColor}99)`,
          display: "flex", alignItems: "center", justifyContent: "center",
          color: "#fff", fontWeight: 700, fontSize: size * 0.38,
          flexShrink: 0,
          fontFamily: "'DM Sans', sans-serif",
        }}>
          {name[0].toUpperCase()}
        </div>
      );
    };

    // ─── BADGE ────────────────────────────────────────────────────────────────────
    const Badge = ({ label, color, bg }) => {
      const dark = useTheme();
      const actualColor = color || (dark ? C.dark.primary : C.primary);
      return (
        <span style={{
          padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600,
          color: actualColor, background: bg || actualColor + "18",
          fontFamily: "'DM Sans', sans-serif",
        }}>{label}</span>
      );
    };

    // ─── CARD ─────────────────────────────────────────────────────────────────────
    const Card = ({ children, style = {}, onClick }) => {
      const dark = useTheme();
      return (
        <div onClick={onClick} style={{
          background: dark ? C.dark.card : C.card, borderRadius: 16, padding: "16px",
          boxShadow: "0 2px 12px rgba(37,99,235,0.07)",
          border: `1px solid ${dark ? C.dark.border : C.border}`,
          color: dark ? C.dark.text : C.text,
          cursor: onClick ? "pointer" : "default",
          transition: "transform 0.15s, box-shadow 0.15s",
          ...style,
        }}
          onMouseEnter={e => { if (onClick) { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 6px 20px rgba(37,99,235,0.13)"; } }}
          onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = "0 2px 12px rgba(37,99,235,0.07)"; }}
        >{children}</div>
      );
    };

    // ─── BTN ──────────────────────────────────────────────────────────────────────
    const Btn = ({ children, onClick, variant = "primary", style = {}, disabled = false }) => {
      const dark = useTheme();
      const pColor = dark ? C.dark.primary : C.primary;

      const styles = {
        primary: { background: pColor, color: "#fff", border: "none" },
        outline: { background: "transparent", color: pColor, border: `1.5px solid ${pColor}` },
        danger: { background: C.danger, color: "#fff", border: "none" },
        ghost: { background: "transparent", color: dark ? C.dark.muted : C.muted, border: `1.5px solid ${dark ? C.dark.border : C.border}` },
        success: { background: C.success, color: "#fff", border: "none" },
      };
      return (
        <button onClick={onClick} disabled={disabled} style={{
          padding: "10px 20px", borderRadius: 10, fontWeight: 600, fontSize: 14,
          cursor: disabled ? "not-allowed" : "pointer",
          fontFamily: "'DM Sans', sans-serif",
          transition: "opacity 0.15s, transform 0.15s",
          opacity: disabled ? 0.5 : 1,
          ...styles[variant], ...style,
        }}
          onMouseEnter={e => { if (!disabled) e.currentTarget.style.opacity = "0.85"; }}
          onMouseLeave={e => { e.currentTarget.style.opacity = "1"; }}
        >{children}</button>
      );
    };

    // ─── INPUT ────────────────────────────────────────────────────────────────────
    const Input = ({ placeholder, type = "text", value, onChange, icon, suffix }) => {
      const dark = useTheme();
      return (
        <div style={{ position: "relative", display: "flex", alignItems: "center" }}>
          {icon && <span style={{ position: "absolute", left: 12, color: dark ? C.dark.muted : C.muted }}><Icon name={icon} size={16} color={dark ? C.dark.muted : C.muted} /></span>}
          <input
            type={type} value={value} onChange={onChange} placeholder={placeholder}
            style={{
              width: "100%", padding: `10px ${suffix ? 44 : 14}px 10px ${icon ? 38 : 14}px`,
              borderRadius: 10, border: `1.5px solid ${dark ? C.dark.border : C.border}`,
              fontSize: 14, fontFamily: "'DM Sans', sans-serif",
              outline: "none", background: dark ? C.dark.bg : C.bg, color: dark ? C.dark.text : C.text,
              boxSizing: "border-box",
              transition: "border-color 0.2s",
            }}
            onFocus={e => e.target.style.borderColor = dark ? C.dark.primary : C.primary}
            onBlur={e => e.target.style.borderColor = dark ? C.dark.border : C.border}
          />
          {suffix && <span style={{ position: "absolute", right: 12, cursor: "pointer", color: dark ? C.dark.muted : C.muted }}>{suffix}</span>}
        </div>
      );
    };

    // ─── SELECT ───────────────────────────────────────────────────────────────────
    const Select = ({ value, onChange, options }) => {
      const dark = useTheme();
      return (
        <select value={value} onChange={onChange} style={{
          width: "100%", padding: "10px 14px", borderRadius: 10,
          border: `1.5px solid ${dark ? C.dark.border : C.border}`, fontSize: 14,
          fontFamily: "'DM Sans', sans-serif", background: dark ? C.dark.bg : C.bg, color: dark ? C.dark.text : C.text,
          outline: "none",
        }}>
          {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      );
    };

    // ─── PROGRESS BAR ─────────────────────────────────────────────────────────────
    const ProgressBar = ({ value, color }) => {
      const dark = useTheme();
      const actualColor = color || (dark ? C.dark.primary : C.primary);
      return (
        <div style={{ height: 6, borderRadius: 4, background: dark ? C.dark.border : C.border, overflow: "hidden" }}>
          <div style={{ width: `${value}%`, height: "100%", borderRadius: 4, background: actualColor, transition: "width 0.5s" }} />
        </div>
      );
    };

    // ─── STAT CARD ────────────────────────────────────────────────────────────────
    const StatCard = ({ label, value, icon, color, sub }) => {
      const dark = useTheme();
      const actualColor = color || (dark ? C.dark.primary : C.primary);
      return (
        <Card style={{ flex: 1, minWidth: 120 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
            <div style={{ padding: 8, borderRadius: 10, background: actualColor + "15" }}>
              <Icon name={icon} size={18} color={actualColor} />
            </div>
            <span style={{ fontSize: 12, color: dark ? C.dark.muted : C.muted, fontWeight: 500 }}>{label}</span>
          </div>
          <div style={{ fontSize: 26, fontWeight: 800, color: dark ? C.dark.text : C.text }}>{value}</div>
          {sub && <div style={{ fontSize: 11, color: dark ? C.dark.muted : C.muted, marginTop: 2 }}>{sub}</div>}
        </Card>
      );
    };

    // ─── NOTIFICATION PANEL ───────────────────────────────────────────────────────
    const NotificationPanel = ({ dark, onClose }) => {
      const notifs = [
        { text: "New submission from Vijay Shah", time: "2m ago", icon: "file", color: C.primary },
        { text: "Review deadline: AI-Based Medical Diagnosis", time: "1h ago", icon: "bell", color: C.warning },
        { text: "Admin approved your account", time: "2h ago", icon: "check", color: C.success },
        { text: "Guide request from Priya Agarwal", time: "3h ago", icon: "request", color: C.accent },
      ];
      return (
        <div style={{
          position: "absolute", top: 50, right: 0, width: 320, zIndex: 1000,
          background: dark ? C.dark.card : C.card,
          borderRadius: 16, boxShadow: "0 8px 32px rgba(0,0,0,0.15)",
          border: `1px solid ${dark ? C.dark.border : C.border}`, overflow: "hidden",
        }}>
          <div style={{ padding: "14px 16px", borderBottom: `1px solid ${dark ? C.dark.border : C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontWeight: 700, fontSize: 15, color: dark ? C.dark.text : C.text }}>Notifications</span>
            <Badge label="4 new" color={C.primary} />
          </div>
          {notifs.map((n, i) => (
            <div key={i} style={{
              padding: "12px 16px", display: "flex", gap: 12, alignItems: "flex-start",
              borderBottom: `1px solid ${dark ? C.dark.border : C.border}`,
              cursor: "pointer", transition: "background 0.15s",
            }}
              onMouseEnter={e => e.currentTarget.style.background = dark ? "#ffffff10" : C.bg}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}
            >
              <div style={{ padding: 8, borderRadius: 10, background: n.color + "15", flexShrink: 0 }}>
                <Icon name={n.icon} size={14} color={n.color} />
              </div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 500, color: dark ? C.dark.text : C.text }}>{n.text}</div>
                <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{n.time}</div>
              </div>
            </div>
          ))}
          <div style={{ padding: "10px 16px", textAlign: "center" }}>
            <span style={{ fontSize: 13, color: C.primary, fontWeight: 600, cursor: "pointer" }}>View all notifications</span>
          </div>
        </div>
      );
    };

    // ─── CHAT PANEL ───────────────────────────────────────────────────────────────
    const ChatPanel = ({ dark, onClose }) => {
      const [msg, setMsg] = useState("");
      const [messages, setMessages] = useState([
        { from: "Dr. Anand Kumar", text: "Please submit your Review 1 PPT by tomorrow.", time: "10:30 AM", me: false },
        { from: "Me", text: "Sure, I'll submit it tonight!", time: "10:32 AM", me: true },
        { from: "Dr. Anand Kumar", text: "Great! Make sure to follow the template.", time: "10:33 AM", me: false },
      ]);
      const send = () => {
        if (!msg.trim()) return;
        setMessages(m => [...m, { from: "Me", text: msg, time: "now", me: true }]);
        setMsg("");
      };
      return (
        <div style={{
          position: "fixed", bottom: 90, right: 20, width: 320, height: 420, zIndex: 999,
          background: dark ? C.dark.card : C.card,
          borderRadius: 20, boxShadow: "0 8px 40px rgba(0,0,0,0.18)",
          border: `1px solid ${dark ? C.dark.border : C.border}`,
          display: "flex", flexDirection: "column", overflow: "hidden",
          animation: "slideUp 0.25s ease",
        }}>
          <style>{`@keyframes slideUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:none } }`}</style>
          <div style={{ padding: "14px 16px", background: C.primary, display: "flex", justifyContent: "space-between", alignItems: "center" }}>

            <div style={{ fontSize: 13, color: C.muted, fontFamily: "'DM Sans', sans-serif" }}>Academic Year 2025–26</div>
          </div>

          {/* Stats Grid */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
            {stats.map((s, i) => (
              <Card key={i} style={{ padding: 14 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                  <div style={{ padding: 8, borderRadius: 10, background: s.color + "15" }}>
                    <Icon name={s.icon} size={16} color={s.color} />
                  </div>
                  <span style={{ fontSize: 12, color: C.muted, fontFamily: "'DM Sans', sans-serif" }}>{s.label}</span>
                </div>
                <div style={{ fontSize: 28, fontWeight: 800, color: s.color, fontFamily: "'DM Sans', sans-serif" }}>{s.value}</div>
              </Card>
            ))}
          </div>

          {/* Quick Actions */}
          <div style={{ fontWeight: 700, fontSize: 15, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif", marginBottom: 10 }}>Quick Actions</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
            {quickActions.map((a, i) => (
              <Card key={i} onClick={() => setAdminTab("section")} style={{ padding: "14px", display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ padding: 10, borderRadius: 12, background: a.color + "15" }}>
                  <Icon name={a.icon} size={18} color={a.color} />
                </div>
                <span style={{ fontSize: 13, fontWeight: 600, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif" }}>{a.label}</span>
                <Icon name="arrow_right" size={14} color={C.muted} style={{ marginLeft: "auto" }} />
              </Card>
            ))}
          </div>

          {/* Progress Overview */}
          <div style={{ fontWeight: 700, fontSize: 15, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif", marginBottom: 10 }}>Submission Progress</div>
          <Card style={{ padding: 16 }}>
            {[
              { label: "Review 1 Submissions", value: 82, color: C.primary },
              { label: "Review 2 Submissions", value: 60, color: C.accent },
              { label: "Final Submissions", value: 25, color: C.success },
            ].map((p, i) => (
              <div key={i} style={{ marginBottom: i < 2 ? 14 : 0 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontSize: 13, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif" }}>{p.label}</span>
                  <span style={{ fontSize: 12, fontWeight: 700, color: p.color, fontFamily: "'DM Sans', sans-serif" }}>{p.value}%</span>
                </div>
                <ProgressBar value={p.value} color={p.color} />
              </div>
            ))}
          </Card>
        </div>
      );
    };

    const AdminRequests = ({ dark }) => {
      const [requests, setRequests] = useState([
        { id: 1, type: "Student Guide Request", from: "Vijay Shah", team: "6BCA_01", project: "AI-Based Medical Diagnosis", domain: "Data Science", status: "pending" },
        { id: 2, type: "Faculty Assignment", from: "Dr. Lisa Wong", team: "4MCA_08", project: "E-commerce Reco", domain: "Web Dev", status: "pending" },
        { id: 3, type: "Student Guide Request", from: "Priya Agarwal", team: "6BCA_02", project: "Healthcare Analytics", domain: "AI/ML", status: "approved" },
      ]);

      const handle = (id, action) => {
        setRequests(r => r.map(req => req.id === id ? { ...req, status: action } : req));
      };

      return (
        <div style={{ padding: "16px 16px 90px" }}>
          <div style={{ fontWeight: 800, fontSize: 18, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif", marginBottom: 16 }}>Requests</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {requests.map(r => (
              <Card key={r.id} style={{ padding: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, fontFamily: "'DM Sans', sans-serif", textTransform: "uppercase", letterSpacing: 0.5 }}>{r.type}</div>
                    <div style={{ fontWeight: 700, fontSize: 14, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif" }}>{r.from}</div>
                    <div style={{ fontSize: 12, color: C.muted, fontFamily: "'DM Sans', sans-serif" }}>{r.team} · {r.project}</div>
                  </div>
                  <Badge label={r.status} color={r.status === "approved" ? C.success : r.status === "rejected" ? C.danger : C.warning} />
                </div>
                <Badge label={r.domain} color={C.accent} />
                {r.status === "pending" && (
                  <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                    <Btn onClick={() => handle(r.id, "approved")} style={{ flex: 1, padding: "8px", fontSize: 13, borderRadius: 10 }}>
                      <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}><Icon name="check" size={14} color="#fff" /> Accept</span>
                    </Btn>
                    <Btn variant="danger" onClick={() => handle(r.id, "rejected")} style={{ flex: 1, padding: "8px", fontSize: 13, borderRadius: 10 }}>
                      <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}><Icon name="x" size={14} color="#fff" /> Reject</span>
                    </Btn>
                  </div>
                )}
                {r.status !== "pending" && (
                  <div style={{ marginTop: 10, padding: "8px 12px", borderRadius: 8, background: (r.status === "approved" ? C.success : C.danger) + "10", fontSize: 12, fontWeight: 600, color: r.status === "approved" ? C.success : C.danger, fontFamily: "'DM Sans', sans-serif" }}>
                    {r.status === "approved" ? "✓ Approved — Team has been notified" : "✗ Rejected — Team has been notified"}
                  </div>
                )}
              </Card>
            ))}
          </div>
        </div>
      );
    };

    const AdminAddSection = ({ dark }) => {
      const [activeSection, setActiveSection] = useState("department");
      const [name, setName] = useState("");
      const [added, setAdded] = useState([]);

      const sections = [
        { key: "department", label: "Dept", icon: "book" },
        { key: "course", label: "Course", icon: "clipboard" },
        { key: "team", label: "Team", icon: "team" },
        { key: "student", label: "Student", icon: "user" },
        { key: "faculty", label: "Faculty", icon: "star" },
        { key: "announcement", label: "Notify", icon: "bell" },
      ];

      return (
        <div style={{ padding: "16px 16px 90px" }}>
          <div style={{ fontWeight: 800, fontSize: 18, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif", marginBottom: 16 }}>Add Section</div>

          <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
            {sections.map(s => (
              <button key={s.key} onClick={() => setActiveSection(s.key)} style={{
                flex: 1, padding: "10px 6px", borderRadius: 10, border: `2px solid ${activeSection === s.key ? C.primary : C.border}`,
                background: activeSection === s.key ? C.primaryLight : C.bg, cursor: "pointer",
                fontWeight: 700, fontSize: 11, fontFamily: "'DM Sans', sans-serif", color: activeSection === s.key ? C.primary : C.muted,
                display: "flex", flexDirection: "column", alignItems: "center", gap: 4, transition: "all 0.2s",
              }}>
                <Icon name={s.icon} size={18} color={activeSection === s.key ? C.primary : C.muted} />
                {s.label}
              </button>
            ))}
          </div>

          <Card style={{ padding: 16, marginBottom: 16 }}>
            <div style={{ fontWeight: 700, fontSize: 14, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif", marginBottom: 14 }}>
              Create {sections.find(s => s.key === activeSection)?.label}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div>
                <label style={{ fontSize: 12, fontWeight: 600, color: C.muted, display: "block", marginBottom: 6, fontFamily: "'DM Sans', sans-serif" }}>Name *</label>
                <Input placeholder={`Enter ${activeSection} name...`} value={name} onChange={e => setName(e.target.value)} />
              </div>
              {activeSection === "course" && (
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: dark ? C.dark.muted : C.muted, display: "block", marginBottom: 6, fontFamily: "'DM Sans', sans-serif" }}>Department</label>
                  <Select value="cs" onChange={() => { }} options={[
                    { value: "cs", label: "Computer Science" },
                    { value: "it", label: "Information Technology" },
                  ]} />
                </div>
              )}
              {activeSection === "team" && (
                <>
                  <div>
                    <label style={{ fontSize: 12, fontWeight: 600, color: dark ? C.dark.muted : C.muted, display: "block", marginBottom: 6, fontFamily: "'DM Sans', sans-serif" }}>Course</label>
                    <Select value="bca" onChange={() => { }} options={[
                      { value: "bca", label: "BCA" },
                      { value: "mca", label: "MCA" },
                    ]} />
                  </div>
                  <div>
                    <label style={{ fontSize: 12, fontWeight: 600, color: dark ? C.dark.muted : C.muted, display: "block", marginBottom: 6, fontFamily: "'DM Sans', sans-serif" }}>Max Members</label>
                    <Input placeholder="4" type="number" value="" onChange={() => { }} />
                  </div>
                </>
              )}
              {(activeSection === "student" || activeSection === "faculty") && (
                <>
                  <div>
                    <label style={{ fontSize: 12, fontWeight: 600, color: dark ? C.dark.muted : C.muted, display: "block", marginBottom: 6, fontFamily: "'DM Sans', sans-serif" }}>Email</label>
                    <Input placeholder="user@university.edu" />
                  </div>
                  <div>
                    <label style={{ fontSize: 12, fontWeight: 600, color: dark ? C.dark.muted : C.muted, display: "block", marginBottom: 6, fontFamily: "'DM Sans', sans-serif" }}>Department</label>
                    <Input placeholder="e.g. Computer Science" />
                  </div>
                </>
              )}
              {activeSection === "announcement" && (
                <>
                  <div>
                    <label style={{ fontSize: 12, fontWeight: 600, color: dark ? C.dark.muted : C.muted, display: "block", marginBottom: 6, fontFamily: "'DM Sans', sans-serif" }}>Message</label>
                    <Input placeholder="Important update info..." />
                  </div>
                  <div>
                    <label style={{ fontSize: 12, fontWeight: 600, color: dark ? C.dark.muted : C.muted, display: "block", marginBottom: 6, fontFamily: "'DM Sans', sans-serif" }}>Target Type</label>
                    <Select value="all" onChange={() => { }} options={[
                      { value: "all", label: "All Users" },
                      { value: "students", label: "Only Students" },
                      { value: "faculty", label: "Only Faculty" },
                    ]} />
                  </div>
                </>
              )}
            </div>
          </Card>
          <Btn style={{ width: "100%", marginTop: 10, borderRadius: 12 }}>Save Section</Btn>
        </div>
      );
    };

    const AdminProfile = ({ dark, onLogout }) => (
      <div style={{ padding: "16px 16px 90px" }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ width: 80, height: 80, borderRadius: "50%", background: `linear-gradient(135deg, ${C.warning}, #d97706)`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 12px", fontSize: 32, fontWeight: 800, color: "#fff" }}>A</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif" }}>Admin</div>
          <div style={{ fontSize: 13, color: C.muted, fontFamily: "'DM Sans', sans-serif" }}>Platform Administrator</div>
          <div style={{ marginTop: 8 }}><Badge label="Admin" color={C.warning} /></div>
        </div>
        <Card style={{ padding: 14, marginBottom: 12 }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif", marginBottom: 10 }}>Settings</div>
          {[
            { label: "Manage Users", icon: "user" },
            { label: "System Reports", icon: "chart" },
            { label: "Timeline Config", icon: "settings" },
            { label: "Lock Submissions", icon: "lock" },
          ].map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: i < 3 ? `1px solid ${C.border}` : "none", cursor: "pointer" }}>
              <Icon name={s.icon} size={16} color={C.muted} />
              <span style={{ flex: 1, fontSize: 13, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif" }}>{s.label}</span>
              <Icon name="arrow_right" size={14} color={C.muted} />
            </div>
          ))}
        </Card>
        <Btn variant="danger" onClick={onLogout} style={{ width: "100%", borderRadius: 12 }}>
          <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}><Icon name="logout" size={16} color="#fff" /> Logout</span>
        </Btn>
      </div>
    );

    // ══════════════════════════════════════════════════════════════════════════════
    // SETTINGS OVERLAY
    // ══════════════════════════════════════════════════════════════════════════════
    const SettingsOverlay = ({ dark, onToggleDark, onClose }) => (
      <div style={{ position: "absolute", inset: 0, background: "#00000080", zIndex: 200, display: "flex", alignItems: "flex-end" }} onClick={onClose}>
        <div onClick={e => e.stopPropagation()} style={{
          width: "100%", background: dark ? C.dark.card : C.card, borderRadius: "20px 20px 0 0",
          padding: 24, boxShadow: "0 -4px 32px rgba(0,0,0,0.15)",
          animation: "slideUp 0.25s ease",
        }}>
          <div style={{ width: 40, height: 4, borderRadius: 2, background: C.border, margin: "0 auto 20px" }} />
          <div style={{ fontWeight: 700, fontSize: 16, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif", marginBottom: 16 }}>Settings</div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 0", borderBottom: `1px solid ${dark ? C.dark.border : C.border}` }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <Icon name={dark ? "moon" : "sun"} size={18} color={C.muted} />
              <span style={{ fontSize: 14, fontWeight: 500, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif" }}>Dark Mode</span>
            </div>
            <button onClick={onToggleDark} style={{
              width: 48, height: 26, borderRadius: 13, border: "none", cursor: "pointer",
              background: dark ? C.primary : C.border, position: "relative", transition: "background 0.3s",
            }}>
              <div style={{
                position: "absolute", top: 3, left: dark ? 24 : 3, width: 20, height: 20,
                borderRadius: "50%", background: "#fff", transition: "left 0.3s",
                boxShadow: "0 1px 4px rgba(0,0,0,0.2)",
              }} />
            </button>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 0", borderBottom: `1px solid ${dark ? C.dark.border : C.border}` }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <Icon name="bell" size={18} color={C.muted} />
              <span style={{ fontSize: 14, fontWeight: 500, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif" }}>Notifications</span>
            </div>
            <Badge label="On" color={C.success} />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 0" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <Icon name="lock" size={18} color={C.muted} />
              <span style={{ fontSize: 14, fontWeight: 500, color: dark ? C.dark.text : C.text, fontFamily: "'DM Sans', sans-serif" }}>Privacy</span>
            </div>
            <Icon name="arrow_right" size={14} color={C.muted} />
          </div>
          <Btn onClick={onClose} style={{ width: "100%", marginTop: 8, borderRadius: 12 }}>Done</Btn>
        </div>
      </div>
    );

    // ══════════════════════════════════════════════════════════════════════════════
    // MAIN APP
    // ══════════════════════════════════════════════════════════════════════════════
    function App() {
      const [screen, setScreen] = useState("splash"); // splash | auth | app
      const [role, setRole] = useState("student");
      const [dark, setDark] = useState(false);
      const [showSettings, setShowSettings] = useState(false);

      // Per-role active tabs
      const [studentTab, setStudentTab] = useState("home");
      const [facultyTab, setFacultyTab] = useState("home");
      const [adminTab, setAdminTab] = useState("dashboard");

      const studentNav = [
        { key: "home", label: "Home", icon: "home" },
        { key: "scorecard", label: "Scorecard", icon: "star" },
        { key: "resources", label: "Resources", icon: "book" },
        { key: "profile", label: "Profile", icon: "user" },
      ];
      const facultyNav = [
        { key: "home", label: "Home", icon: "home" },
        { key: "registrations", label: "Registrations", icon: "plus" },
        { key: "review", label: "Review Hub", icon: "clipboard" },
        { key: "form", label: "Form", icon: "send" },
        { key: "profile", label: "Profile", icon: "user" },
      ];
      const adminNav = [
        { key: "dashboard", label: "Dashboard", icon: "dashboard" },
        { key: "requests", label: "Requests", icon: "request" },
        { key: "section", label: "Add Section", icon: "section" },
        { key: "profile", label: "Profile", icon: "user" },
      ];

      const getPageTitle = () => {
        if (role === "student") {
          const map = { home: "Home", scorecard: "Scorecard", resources: "Resources", profile: "Profile" };
          return map[studentTab] || "Home";
        }
        if (role === "faculty") {
          const map = { home: "Dashboard", review: "Review Hub", form: "Create Form", profile: "Profile" };
          return map[facultyTab] || "Dashboard";
        }
        const map = { dashboard: "Admin Dashboard", requests: "Requests", section: "Add Section", profile: "Profile" };
        return map[adminTab] || "Dashboard";
      };

      const bg = dark ? C.dark.bg : C.bg;
      const textColor = dark ? C.dark.text : C.text;

      return (
        <ThemeContext.Provider value={dark}>
          <div style={{
            width: "100%", maxWidth: 480, margin: "0 auto", height: "100vh",
            background: bg, position: "relative", overflow: "hidden",
            fontFamily: "'DM Sans', sans-serif",
            transition: "background 0.3s",
          }}>
            <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap');
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: ${C.border}; border-radius: 2px; }
        @keyframes slideUp { from { opacity:0; transform:translateY(30px) } to { opacity:1; transform:none } }
        @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
      `}</style>

            {/* SPLASH */}
            {screen === "splash" && <SplashScreen onDone={() => setScreen("auth")} />}

            {/* AUTH */}
            {screen === "auth" && (
              <div style={{ height: "100%", overflowY: "auto" }}>
                <AuthScreen onLogin={(r) => { setRole(r); setScreen("app"); }} />
              </div>
            )}

            {/* APP */}
            {screen === "app" && (
              <div style={{ height: "100%", display: "flex", flexDirection: "column", animation: "fadeIn 0.3s ease" }}>
                <TopBar
                  title={getPageTitle()} dark={dark} onToggleDark={() => setDark(v => !v)}
                  onProfile={() => setShowSettings(true)} role={role}
                  onLogout={() => setScreen("auth")}
                />
                <div style={{ flex: 1, overflowY: "auto" }}>

                  {/* STUDENT PAGES */}
                  {role === "student" && studentTab === "home" && <StudentHome onFindGuide={() => setStudentTab("findGuide")} />}
                  {role === "student" && studentTab === "findGuide" && <StudentFindGuide onBack={() => setStudentTab("home")} />}
                  {role === "student" && studentTab === "scorecard" && <StudentScorecard dark={dark} />}
                  {role === "student" && studentTab === "resources" && <StudentResources dark={dark} />}
                  {role === "student" && studentTab === "profile" && <StudentProfile dark={dark} onLogout={() => setScreen("auth")} />}

                  {/* FACULTY PAGES */}
                  {role === "faculty" && facultyTab === "home" && <FacultyHome />}
                  {role === "faculty" && facultyTab === "registrations" && <FacultyRegistrations />}
                  {role === "faculty" && facultyTab === "review" && <FacultyReviewHub dark={dark} />}
                  {role === "faculty" && facultyTab === "form" && <FacultyForm dark={dark} />}
                  {role === "faculty" && facultyTab === "profile" && <FacultyProfile dark={dark} onLogout={() => setScreen("auth")} />}

                  {/* ADMIN PAGES */}
                  {role === "admin" && adminTab === "dashboard" && <AdminDashboard setAdminTab={setAdminTab} />}
                  {role === "admin" && adminTab === "requests" && <AdminRequests dark={dark} />}
                  {role === "admin" && adminTab === "section" && <AdminAddSection dark={dark} />}
                  {role === "admin" && adminTab === "profile" && <AdminProfile dark={dark} onLogout={() => setScreen("auth")} />}
                </div>

                {/* Bottom Nav */}
                {role === "student" && <BottomNav items={studentNav} active={studentTab} onSelect={setStudentTab} dark={dark} />}
                {role === "faculty" && <BottomNav items={facultyNav} active={facultyTab} onSelect={setFacultyTab} dark={dark} />}
                {role === "admin" && <BottomNav items={adminNav} active={adminTab} onSelect={setAdminTab} dark={dark} />}

                {/* Settings Overlay */}
                {showSettings && (
                  <SettingsOverlay dark={dark} onToggleDark={() => setDark(v => !v)} onClose={() => setShowSettings(false)} />
                )}
              </div>
            )}
          </div>
        </ThemeContext.Provider>
      );
    }


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
